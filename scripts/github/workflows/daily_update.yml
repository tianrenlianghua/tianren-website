name: 每日自动更新官网数据

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 执行自动更新
        run: python scripts/auto_update.py

      - name: 检查是否有变更
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "天刃量化Bot"
          git config user.email "1923848362@qq.com"
          git add data.json index.html
          git commit -m "每日自动更新 $(date +'%Y-%m-%d %H:%M')"
          git push
